<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OBS Slider Widget</title>
  <meta name="robots" content="index, follow" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://slider.obs.xn--jgy.tw/" />
  <meta property="og:title" content="OBS Slider Widget" />
  <meta property="og:description" content="OBS 垂直進度條小工具 - 為直播畫面加上精緻的進度條" />
  <meta property="og:image" content="https://slider.obs.xn--jgy.tw/preview.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:url" content="https://slider.obs.xn--jgy.tw/" />
  <meta name="twitter:title" content="OBS Slider Widget" />
  <meta name="twitter:description" content="OBS 垂直進度條小工具 - 為直播畫面加上精緻的進度條" />
  <meta name="twitter:image" content="https://slider.obs.xn--jgy.tw/preview.png" />

  <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="OBS Slider" />
  <link rel="manifest" href="/site.webmanifest" />

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Fonts: Default Font -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=UoqMunThenKhung&display=swap">

  <!-- Tailwind Configuration -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ["'UoqMunThenKhung'", "'Segoe UI'", 'Tahoma', 'Geneva', 'Verdana', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <!-- OBS Detection -->
  <script>
    if (navigator.userAgent.indexOf('OBS') !== -1) {
      document.documentElement.classList.add('obs');
    }
  </script>

  <!-- Global Styles -->
  <style>
    body {
      background: #1a1a2e;
    }

    html.obs body {
      background: transparent;
    }

    html.obs main {
      box-shadow: none;
      border: none;
      background: transparent;
      -webkit-backdrop-filter: none;
      backdrop-filter: none;
    }

    :root {
      --glass-bg: rgba(255, 255, 255, 0.18);
      --glass-blur: blur(20px);
      --glass-border: rgba(255, 255, 255, 0.4);
      --glass-shadow: 0 8px 32px rgba(31, 38, 135, 0.25), inset 0 1px 0 rgba(255, 255, 255, 0.15);
      --theme-color: #ffffff;
    }

    .glass {
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.18) 0%, rgba(255, 255, 255, 0.08) 100%);
      -webkit-backdrop-filter: var(--glass-blur);
      backdrop-filter: var(--glass-blur);
      box-shadow: var(--glass-shadow);
      border: 1px solid var(--glass-border);
    }

    /* Controls: Always-dark aside panel */
    aside {
      background: rgba(15, 15, 30, 0.95);
    }

    /* Progress Bar: Vertical Title */
    .progress-title {
      transition: font-size 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      color: color-mix(in srgb, var(--theme-color) 80%, transparent);
      font-weight: bold;
      letter-spacing: 1px;
      writing-mode: vertical-rl;
      text-orientation: mixed;
      text-shadow: 0 0 6px color-mix(in srgb, var(--theme-color) 30%, transparent),
                   0 0 18px color-mix(in srgb, var(--theme-color) 15%, transparent);
    }

    /* Progress Bar: Vertical Status */
    .progress-status {
      transition: font-size 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      writing-mode: vertical-rl;
      text-orientation: mixed;
      text-shadow: 0 0 6px color-mix(in srgb, var(--theme-color) 30%, transparent),
                   0 0 18px color-mix(in srgb, var(--theme-color) 15%, transparent);
    }

    /* Progress Bar: Glass Track */
    .glass-track {
      position: relative;
      flex: 1;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
      width: 20px;
      overflow: hidden;
      -webkit-backdrop-filter: var(--glass-blur);
      backdrop-filter: var(--glass-blur);
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.15), inset 0 1px 2px rgba(255, 255, 255, 0.15);
      border: 2px solid rgba(255, 255, 255, 0.5);
    }

    /* Progress Bar: Glass Fill */
    .glass-fill {
      transform: scaleY(0);
      transform-origin: bottom;
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      background: color-mix(in srgb, var(--theme-color) 90%, transparent);
      width: 100%;
      height: 100%;
    }

    /* Controls: Glass Input */
    .glass-input {
      background: rgba(255, 255, 255, 0.1);
      -webkit-backdrop-filter: blur(5px);
      backdrop-filter: blur(5px);
      border: 1px solid var(--glass-border);
    }

    /* Controls: Glass Range Slider */
    .glass-range {
      -webkit-appearance: none;
      appearance: none;
      outline: none;
      border: 1px solid var(--glass-border);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.2);
      height: 6px;
    }

    .glass-range::-webkit-slider-thumb {
      -webkit-appearance: none;
      transition: transform 0.2s;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
      border: 1px solid var(--glass-border);
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.9);
      width: 18px;
      height: 18px;
    }

    .glass-range::-webkit-slider-thumb:hover {
      transform: scale(1.15);
    }

    .glass-range::-moz-range-thumb {
      transition: transform 0.2s;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
      border: 1px solid var(--glass-border);
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.9);
      width: 18px;
      height: 18px;
    }

    .glass-range::-moz-range-track {
      border: 1px solid var(--glass-border);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.2);
      height: 6px;
    }

    aside::-webkit-scrollbar {
      width: 6px;
    }
    aside::-webkit-scrollbar-thumb {
      border-radius: 3px;
      background: rgba(255, 255, 255, 0.2);
    }
    aside::-webkit-scrollbar-track {
      background: transparent;
    }
  </style>
</head>

<body class="font-sans">
  <!-- Two-Panel Layout -->
  <div id="layoutContainer" class="flex h-screen w-screen overflow-hidden gap-1">

    <!-- Left Panel: Controls Area -->
    <aside class="glass w-[300px] flex flex-col p-6 overflow-y-auto" style="scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.2) transparent;">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-semibold text-white/90">控制台</h2>
        <button type="button" id="flipLayout" aria-label="Flip layout"
                class="glass-input w-8 h-8 text-sm text-white/90 rounded-lg flex items-center justify-center cursor-pointer select-none" title="翻轉面板">⇄</button>
      </div>
      <form id="controlForm" class="space-y-5">

        <!-- Preset Management -->
        <div class="space-y-2 pb-4 mb-1 border-b border-white/10">
          <label class="block text-sm text-white/70 mb-1">預設管理</label>
          <select id="presetSelect"
                  class="glass-input w-full px-3 py-2 rounded-lg text-white/90 outline-none focus:ring-1 focus:ring-white/40 cursor-pointer">
          </select>
          <div class="flex gap-2">
            <input type="text" id="presetName" placeholder="預設名稱..."
                   class="glass-input flex-1 min-w-0 px-3 py-2 rounded-lg text-white/90 placeholder-white/40 outline-none focus:ring-1 focus:ring-white/40" />
            <button type="button" id="presetSave"
                    class="glass-input flex-shrink-0 whitespace-nowrap px-3 py-2 rounded-lg text-white/90 cursor-pointer select-none hover:bg-white/20 transition-colors">儲存</button>
            <button type="button" id="presetDelete"
                    class="glass-input flex-shrink-0 whitespace-nowrap px-3 py-2 rounded-lg text-white/90 cursor-pointer select-none hover:bg-white/20 transition-colors">刪除</button>
          </div>
        </div>
        
        <div>
          <label for="titleText" class="block text-sm text-white/70 mb-1">標題文字</label>
          <input type="text" id="titleText" value="吃了幾碗飯" placeholder="輸入標題..."
                 class="glass-input w-full px-3 py-2 rounded-lg text-white/90 placeholder-white/40 outline-none focus:ring-1 focus:ring-white/40" />
        </div>
        
        <div>
          <label for="titleSize" class="block text-sm text-white/70 mb-1">標題尺寸 (12 ~ 32px)</label>
          <input type="range" id="titleSize" min="12" max="32" value="32" class="glass-range w-full" />
        </div>
        
        <div>
          <label for="totalVal" class="block text-sm text-white/70 mb-1">總數值</label>
          <input type="number" id="totalVal" min="1" value="20"
                 class="glass-input w-full px-3 py-2 rounded-lg text-white/90 placeholder-white/40 outline-none focus:ring-1 focus:ring-white/40" />
        </div>
        
        <div>
          <label for="progressVal" class="block text-sm text-white/70 mb-1">進度值</label>
          <div class="flex items-center gap-2">
            <button type="button" id="progressDec" aria-label="Decrease progress"
                    class="glass-input w-12 h-10 text-xl font-bold text-white/90 rounded-lg flex items-center justify-center cursor-pointer select-none">−</button>
            <input type="range" id="progressVal" min="0" max="20" value="12" class="glass-range flex-1" />
            <button type="button" id="progressInc" aria-label="Increase progress"
                    class="glass-input w-12 h-10 text-xl font-bold text-white/90 rounded-lg flex items-center justify-center cursor-pointer select-none">+</button>
          </div>
        </div>
        
        <div>
          <label for="themeColor" class="block text-sm text-white/70 mb-1">主題色彩</label>
          <input type="text" id="themeColor" value="#ffffff" placeholder="#ffffff"
                 class="glass-input w-full px-3 py-2 rounded-lg text-white/90 placeholder-white/40 outline-none focus:ring-1 focus:ring-white/40"
                 style="border-left: 6px solid #ffffff;" />
        </div>
        
        <div>
          <label for="statusSize" class="block text-sm text-white/70 mb-1">狀態尺寸 (10 ~ 24px)</label>
          <input type="range" id="statusSize" min="10" max="24" value="24" class="glass-range w-full" />
        </div>
        
        <div>
          <label for="fontFamily" class="block text-sm text-white/70 mb-1">字型名稱</label>
          <input type="text" id="fontFamily" value="UoqMunThenKhung" placeholder="輸入字型名稱..."
                 class="glass-input w-full px-3 py-2 rounded-lg text-white/90 placeholder-white/40 outline-none focus:ring-1 focus:ring-white/40" />
          <p class="text-xs text-white/40 mt-1">從 <a href="https://fonts.google.com" target="_blank" rel="noopener noreferrer" class="underline hover:text-white/60">fonts.google.com</a> 取得可用字型名稱</p>
        </div>
      </form>
      <footer class="mt-auto pt-4 border-t border-white/10 text-center text-xs text-white/50 space-y-1">
        <p>
          Copyright &copy; 2026 Jim Chen
          <a href="https://github.com/jim60105/obs-slider-widget" target="_blank" rel="noopener noreferrer" class="inline-block align-middle ml-1 hover:text-white/80 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16">
              <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
            </svg>
          </a>
        </p>
        <p>Licensed under <a href="./LICENSE" target="_blank" rel="noopener noreferrer" class="underline hover:text-white/80 transition-colors">AGPLv3</a></p>
      </footer>
    </aside>

    <!-- Right Panel: Display Area -->
    <main id="displayPanel" class="glass flex-1 flex items-stretch justify-end p-8">
      <!-- Progress Bar Widget -->
      <div class="flex items-stretch gap-4 h-full">
        <!-- Vertical Title (align top) -->
        <span id="displayTitle" class="progress-title self-start" style="font-size: 16px;">STATUS</span>

        <!-- Glass Track -->
        <div id="myProgressBar" class="glass-track" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
          <div id="myProgressFill" class="glass-fill"></div>
        </div>

        <!-- Fraction Display (align bottom) -->
        <span id="displayPercent" class="progress-status self-end pb-1" style="font-size: 14px; color: color-mix(in srgb, var(--theme-color) 80%, transparent);">0/20</span>
      </div>
    </main>

  </div>

  <script>
    // --- Preset Persistence (namespace + CRUD) ---
    function getStorageKey() {
      const params = new URLSearchParams(window.location.search);
      const instance = params.get('instance') || 'default';
      return `obs-slider-${instance}-presets`;
    }

    function loadAllPresets() {
      try {
        return JSON.parse(localStorage.getItem(getStorageKey())) || {};
      } catch { return {}; }
    }

    function saveAllPresets(presets) {
      localStorage.setItem(getStorageKey(), JSON.stringify(presets));
    }

    function savePreset(name) {
      const trimmed = (name || '').trim();
      if (!trimmed) return;
      const presets = loadAllPresets();
      presets[trimmed] = {
        titleText: document.getElementById('titleText').value,
        titleSize: Number(document.getElementById('titleSize').value),
        totalVal: Number(document.getElementById('totalVal').value),
        progressVal: Number(document.getElementById('progressVal').value),
        themeColor: document.getElementById('themeColor').value,
        statusSize: Number(document.getElementById('statusSize').value),
        fontFamily: document.getElementById('fontFamily').value
      };
      saveAllPresets(presets);
      refreshPresetDropdown();
      document.getElementById('presetSelect').value = trimmed;
    }

    function loadPreset(name) {
      const presets = loadAllPresets();
      const preset = presets[name];
      if (!preset) return;

      const fields = ['titleText', 'titleSize', 'totalVal', 'progressVal', 'themeColor', 'statusSize', 'fontFamily'];
      for (const key of fields) {
        if (preset[key] !== undefined) {
          const el = document.getElementById(key);
          if (el) el.value = preset[key];
        }
      }

      // Sync totalVal → progressVal max
      const totalEl = document.getElementById('totalVal');
      const progressEl = document.getElementById('progressVal');
      progressEl.max = Math.max(1, Number(totalEl.value) || 1);
      if (Number(progressEl.value) > Number(progressEl.max)) {
        progressEl.value = progressEl.max;
      }

      // Apply theme color
      const hex = (preset.themeColor || '').trim();
      if (/^#([0-9A-Fa-f]{3}|[0-9A-Fa-f]{6})$/.test(hex)) {
        document.documentElement.style.setProperty('--theme-color', hex);
        document.getElementById('themeColor').style.borderLeftColor = hex;
      }

      // Apply font
      if (preset.fontFamily && preset.fontFamily.trim()) {
        loadGoogleFont(preset.fontFamily.trim());
        applyFont(preset.fontFamily.trim());
      }

      // Sync display
      document.getElementById('displayTitle').textContent = document.getElementById('titleText').value || '吃了幾碗飯';
      document.getElementById('displayTitle').style.fontSize = `${document.getElementById('titleSize').value}px`;
      document.getElementById('displayPercent').style.fontSize = `${document.getElementById('statusSize').value}px`;
      updateProgressDisplay(progressEl.value, totalEl.value);
    }

    function deletePreset(name) {
      const presets = loadAllPresets();
      delete presets[name];
      saveAllPresets(presets);
      refreshPresetDropdown();
    }

    function refreshPresetDropdown() {
      const select = document.getElementById('presetSelect');
      const presets = loadAllPresets();
      const names = Object.keys(presets).sort();
      select.innerHTML = '';
      for (const n of names) {
        const opt = document.createElement('option');
        opt.value = n;
        opt.textContent = n;
        select.appendChild(opt);
      }
    }

    const FALLBACK_FONTS = "'Segoe UI', Tahoma, Geneva, Verdana, sans-serif";

    function loadGoogleFont(fontName) {
      const encoded = encodeURIComponent(fontName);
      const link = document.createElement('link');
      link.rel = 'stylesheet';
      link.href = `https://fonts.googleapis.com/css2?family=${encoded}&display=swap`;
      document.head.appendChild(link);
    }

    function applyFont(fontName) {
      document.body.style.fontFamily = `'${fontName}', ${FALLBACK_FONTS}`;
    }

    function debounce(fn, delay) {
      let timer;
      return (...args) => {
        clearTimeout(timer);
        timer = setTimeout(() => fn(...args), delay);
      };
    }

    const debouncedLoadAndApply = debounce((fontName) => {
      if (fontName.trim()) {
        loadGoogleFont(fontName.trim());
        applyFont(fontName.trim());
      }
    }, 500);

    function updateProgressDisplay(current, total) {
      const validTotal = Math.max(1, Number(total) || 1);
      const validCurrent = Math.max(0, Math.min(validTotal, Number(current) || 0));

      const progressBar = document.getElementById('myProgressBar');
      const progressFill = document.getElementById('myProgressFill');
      const displayPercent = document.getElementById('displayPercent');

      if (progressFill) {
        progressFill.style.transform = `scaleY(${validCurrent / validTotal})`;
      }
      if (displayPercent) {
        displayPercent.textContent = `${validCurrent}/${validTotal}`;
      }
      if (progressBar) {
        progressBar.setAttribute('aria-valuenow', validCurrent);
        progressBar.setAttribute('aria-valuemax', validTotal);
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      const controlForm = document.getElementById('controlForm');
      const displayTitle = document.getElementById('displayTitle');

      // Initialize default preset if none exist, then auto-load first
      refreshPresetDropdown();
      let presets = loadAllPresets();
      if (Object.keys(presets).length === 0) {
        savePreset('default');
        presets = loadAllPresets();
      }
      const presetNames = Object.keys(presets).sort();
      if (presetNames.length > 0) {
        document.getElementById('presetSelect').value = presetNames[0];
        loadPreset(presetNames[0]);
      }

      // Initialize display with form values (handles both preset-loaded and default cases)
      const initialProgress = document.getElementById('progressVal').value;
      const initialTotal = document.getElementById('totalVal').value;
      const initialTitle = document.getElementById('titleText').value;
      const initialSize = document.getElementById('titleSize').value;
      const initialStatusSize = document.getElementById('statusSize').value;
      
      document.getElementById('progressVal').max = initialTotal;
      updateProgressDisplay(initialProgress, initialTotal);
      displayTitle.textContent = initialTitle;
      displayTitle.style.fontSize = `${initialSize}px`;
      document.getElementById('displayPercent').style.fontSize = `${initialStatusSize}px`;

      // Apply font (may already be set by preset, but ensures correct state)
      const initialFont = document.getElementById('fontFamily').value;
      applyFont(initialFont);

      // Real-time sync via input event delegation (no submit needed)
      controlForm.addEventListener('input', (event) => {
        const target = event.target;
        switch (target.id) {
          case 'titleText':
            displayTitle.textContent = target.value || '吃了幾碗飯';
            break;
          case 'titleSize':
            displayTitle.style.fontSize = `${target.value}px`;
            break;
          case 'totalVal': {
            const newTotal = Math.max(1, Number(target.value) || 1);
            const progressSlider = document.getElementById('progressVal');
            progressSlider.max = newTotal;
            if (Number(progressSlider.value) > newTotal) {
              progressSlider.value = newTotal;
            }
            updateProgressDisplay(progressSlider.value, newTotal);
            break;
          }
          case 'progressVal':
            updateProgressDisplay(target.value, document.getElementById('totalVal').value);
            break;
          case 'themeColor': {
            const hex = target.value.trim();
            if (/^#([0-9A-Fa-f]{3}|[0-9A-Fa-f]{6})$/.test(hex)) {
              document.documentElement.style.setProperty('--theme-color', hex);
              target.style.borderLeftColor = hex;
            }
            break;
          }
          case 'statusSize':
            document.getElementById('displayPercent').style.fontSize = `${target.value}px`;
            break;
          case 'fontFamily':
            debouncedLoadAndApply(target.value);
            break;
        }
      });

      document.getElementById('progressDec').addEventListener('click', () => {
        const slider = document.getElementById('progressVal');
        const newVal = Math.max(0, Number(slider.value) - 1);
        slider.value = newVal;
        slider.dispatchEvent(new Event('input', { bubbles: true }));
      });

      document.getElementById('progressInc').addEventListener('click', () => {
        const slider = document.getElementById('progressVal');
        const newVal = Math.min(Number(slider.max), Number(slider.value) + 1);
        slider.value = newVal;
        slider.dispatchEvent(new Event('input', { bubbles: true }));
      });

      document.getElementById('flipLayout').addEventListener('click', () => {
        const container = document.getElementById('layoutContainer');
        const display = document.getElementById('displayPanel');
        container.classList.toggle('flex-row-reverse');
        display.classList.toggle('justify-end');
        display.classList.toggle('justify-start');
      });

      // Preset event handlers
      document.getElementById('presetSelect').addEventListener('change', (e) => {
        if (e.target.value) loadPreset(e.target.value);
      });

      document.getElementById('presetSave').addEventListener('click', () => {
        const nameInput = document.getElementById('presetName');
        const select = document.getElementById('presetSelect');
        const name = nameInput.value.trim() || select.value;
        if (name) {
          savePreset(name);
          nameInput.value = '';
        }
      });

      document.getElementById('presetDelete').addEventListener('click', () => {
        const select = document.getElementById('presetSelect');
        if (select.value) deletePreset(select.value);
      });
    });
  </script>
</body>
</html>
