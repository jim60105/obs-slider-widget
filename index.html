<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OBS Slider Widget</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Fonts: Default Font -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=UoqMunThenKhung&display=swap">

  <!-- Tailwind Configuration -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ["'UoqMunThenKhung'", "'Segoe UI'", 'Tahoma', 'Geneva', 'Verdana', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <!-- OBS Detection -->
  <script>
    if (navigator.userAgent.indexOf('OBS') !== -1) {
      document.documentElement.classList.add('obs');
    }
  </script>

  <!-- Global Styles -->
  <style>
    body {
      background: #1a1a2e;
    }

    html.obs body {
      background: transparent;
    }

    :root {
      --glass-bg: rgba(255, 255, 255, 0.18);
      --glass-blur: blur(20px);
      --glass-border: rgba(255, 255, 255, 0.4);
      --glass-shadow: 0 8px 32px rgba(31, 38, 135, 0.25), inset 0 1px 0 rgba(255, 255, 255, 0.15);
      --theme-color: #ffffff;
    }

    .glass {
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.18) 0%, rgba(255, 255, 255, 0.08) 100%);
      -webkit-backdrop-filter: var(--glass-blur);
      backdrop-filter: var(--glass-blur);
      box-shadow: var(--glass-shadow);
      border: 1px solid var(--glass-border);
    }

    /* Controls: Always-dark aside panel */
    aside {
      background: rgba(15, 15, 30, 0.95);
    }

    /* Progress Bar: Vertical Title */
    .progress-title {
      transition: font-size 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      color: color-mix(in srgb, var(--theme-color) 80%, transparent);
      text-shadow: 0 0 6px color-mix(in srgb, var(--theme-color) 30%, transparent),
                   0 0 18px color-mix(in srgb, var(--theme-color) 15%, transparent);
      font-weight: bold;
      letter-spacing: 1px;
      writing-mode: vertical-rl;
      text-orientation: mixed;
    }

    /* Progress Bar: Vertical Status */
    .progress-status {
      transition: font-size 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      text-shadow: 0 0 6px color-mix(in srgb, var(--theme-color) 30%, transparent),
                   0 0 18px color-mix(in srgb, var(--theme-color) 15%, transparent);
      writing-mode: vertical-rl;
      text-orientation: mixed;
    }

    /* Progress Bar: Glass Track */
    .glass-track {
      position: relative;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
      width: 20px;
      height: 400px;
      overflow: hidden;
      -webkit-backdrop-filter: var(--glass-blur);
      backdrop-filter: var(--glass-blur);
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.15), inset 0 1px 2px rgba(255, 255, 255, 0.15);
      border: 2px solid rgba(255, 255, 255, 0.5);
    }

    /* Progress Bar: Glass Fill */
    .glass-fill {
      transform: scaleY(0);
      transform-origin: bottom;
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      background: color-mix(in srgb, var(--theme-color) 90%, transparent);
      width: 100%;
      height: 100%;
    }

    /* Controls: Glass Input */
    .glass-input {
      background: rgba(255, 255, 255, 0.1);
      -webkit-backdrop-filter: blur(5px);
      backdrop-filter: blur(5px);
      border: 1px solid var(--glass-border);
    }

    /* Controls: Glass Range Slider */
    .glass-range {
      -webkit-appearance: none;
      appearance: none;
      outline: none;
      border: 1px solid var(--glass-border);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.2);
      height: 6px;
    }

    .glass-range::-webkit-slider-thumb {
      -webkit-appearance: none;
      transition: transform 0.2s;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
      border: 1px solid var(--glass-border);
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.9);
      width: 18px;
      height: 18px;
    }

    .glass-range::-webkit-slider-thumb:hover {
      transform: scale(1.15);
    }

    .glass-range::-moz-range-thumb {
      transition: transform 0.2s;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
      border: 1px solid var(--glass-border);
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.9);
      width: 18px;
      height: 18px;
    }

    .glass-range::-moz-range-track {
      border: 1px solid var(--glass-border);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.2);
      height: 6px;
    }
  </style>
</head>

<body class="font-sans">
  <!-- Two-Panel Layout -->
  <div class="flex h-screen w-screen overflow-hidden gap-1">

    <!-- Left Panel: Controls Area -->
    <aside class="glass w-[300px] flex flex-col justify-between p-6">
      <form id="controlForm" class="space-y-5">
        <h2 class="text-lg font-semibold text-white/90 mb-4">控制台</h2>
        
        <div>
          <label for="titleText" class="block text-sm text-white/70 mb-1">標題文字</label>
          <input type="text" id="titleText" value="吃了幾碗飯" placeholder="輸入標題..."
                 class="glass-input w-full px-3 py-2 rounded-lg text-white/90 placeholder-white/40 outline-none focus:ring-1 focus:ring-white/40" />
        </div>
        
        <div>
          <label for="titleSize" class="block text-sm text-white/70 mb-1">標題尺寸 (12 ~ 32px)</label>
          <input type="range" id="titleSize" min="12" max="32" value="32" class="glass-range w-full" />
        </div>
        
        <div>
          <label for="totalVal" class="block text-sm text-white/70 mb-1">總數值</label>
          <input type="number" id="totalVal" min="1" value="20"
                 class="glass-input w-full px-3 py-2 rounded-lg text-white/90 placeholder-white/40 outline-none focus:ring-1 focus:ring-white/40" />
        </div>
        
        <div>
          <label for="progressVal" class="block text-sm text-white/70 mb-1">進度值</label>
          <input type="range" id="progressVal" min="0" max="20" value="12" class="glass-range w-full" />
        </div>
        
        <div>
          <label for="themeColor" class="block text-sm text-white/70 mb-1">主題色彩</label>
          <input type="color" id="themeColor" value="#ffffff"
                 class="glass-input w-full h-10 rounded-lg cursor-pointer outline-none focus:ring-1 focus:ring-white/40" />
        </div>
        
        <div>
          <label for="statusSize" class="block text-sm text-white/70 mb-1">狀態尺寸 (10 ~ 24px)</label>
          <input type="range" id="statusSize" min="10" max="24" value="24" class="glass-range w-full" />
        </div>
        
        <div>
          <label for="fontFamily" class="block text-sm text-white/70 mb-1">字型名稱</label>
          <input type="text" id="fontFamily" value="UoqMunThenKhung" placeholder="輸入字型名稱..."
                 class="glass-input w-full px-3 py-2 rounded-lg text-white/90 placeholder-white/40 outline-none focus:ring-1 focus:ring-white/40" />
          <p class="text-xs text-white/40 mt-1">從 <a href="https://fonts.google.com" target="_blank" rel="noopener noreferrer" class="underline hover:text-white/60">fonts.google.com</a> 取得可用字型名稱</p>
        </div>
      </form>
      <footer class="mt-auto pt-4 border-t border-white/10 text-center text-xs text-white/50 space-y-1">
        <p>
          Copyright &copy; 2026 Jim Chen
          <a href="https://github.com/jim60105/obs-slider-widget" target="_blank" rel="noopener noreferrer" class="inline-block align-middle ml-1 hover:text-white/80 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16">
              <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
            </svg>
          </a>
        </p>
        <p>Licensed under <a href="https://www.gnu.org/licenses/agpl-3.0.html" target="_blank" rel="noopener noreferrer" class="underline hover:text-white/80 transition-colors">AGPLv3</a></p>
      </footer>
    </aside>

    <!-- Right Panel: Display Area -->
    <main class="glass flex-1 flex items-center justify-center p-8">
      <!-- Progress Bar Widget -->
      <div class="flex items-stretch gap-4">
        <!-- Vertical Title (align top) -->
        <span id="displayTitle" class="progress-title self-start" style="font-size: 16px;">STATUS</span>

        <!-- Glass Track -->
        <div id="myProgressBar" class="glass-track" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
          <div id="myProgressFill" class="glass-fill"></div>
        </div>

        <!-- Fraction Display (align bottom) -->
        <span id="displayPercent" class="progress-status self-end pb-1" style="font-size: 14px; color: color-mix(in srgb, var(--theme-color) 80%, transparent);">0/20</span>
      </div>
    </main>

  </div>

  <script>
    const FALLBACK_FONTS = "'Segoe UI', Tahoma, Geneva, Verdana, sans-serif";

    function loadGoogleFont(fontName) {
      const encoded = encodeURIComponent(fontName);
      const link = document.createElement('link');
      link.rel = 'stylesheet';
      link.href = `https://fonts.googleapis.com/css2?family=${encoded}&display=swap`;
      document.head.appendChild(link);
    }

    function applyFont(fontName) {
      document.body.style.fontFamily = `'${fontName}', ${FALLBACK_FONTS}`;
    }

    function debounce(fn, delay) {
      let timer;
      return (...args) => {
        clearTimeout(timer);
        timer = setTimeout(() => fn(...args), delay);
      };
    }

    const debouncedLoadAndApply = debounce((fontName) => {
      if (fontName.trim()) {
        loadGoogleFont(fontName.trim());
        applyFont(fontName.trim());
      }
    }, 500);

    function updateProgressDisplay(current, total) {
      const validTotal = Math.max(1, Number(total) || 1);
      const validCurrent = Math.max(0, Math.min(validTotal, Number(current) || 0));

      const progressBar = document.getElementById('myProgressBar');
      const progressFill = document.getElementById('myProgressFill');
      const displayPercent = document.getElementById('displayPercent');

      if (progressFill) {
        progressFill.style.transform = `scaleY(${validCurrent / validTotal})`;
      }
      if (displayPercent) {
        displayPercent.textContent = `${validCurrent}/${validTotal}`;
      }
      if (progressBar) {
        progressBar.setAttribute('aria-valuenow', validCurrent);
        progressBar.setAttribute('aria-valuemax', validTotal);
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      const controlForm = document.getElementById('controlForm');
      const displayTitle = document.getElementById('displayTitle');

      // Initialize display with form default values
      const initialProgress = document.getElementById('progressVal').value;
      const initialTotal = document.getElementById('totalVal').value;
      const initialTitle = document.getElementById('titleText').value;
      const initialSize = document.getElementById('titleSize').value;
      const initialStatusSize = document.getElementById('statusSize').value;
      
      document.getElementById('progressVal').max = initialTotal;
      updateProgressDisplay(initialProgress, initialTotal);
      displayTitle.textContent = initialTitle;
      displayTitle.style.fontSize = `${initialSize}px`;
      document.getElementById('displayPercent').style.fontSize = `${initialStatusSize}px`;

      // Apply default font
      const initialFont = document.getElementById('fontFamily').value;
      applyFont(initialFont);

      // Real-time sync via input event delegation (no submit needed)
      controlForm.addEventListener('input', (event) => {
        const target = event.target;
        switch (target.id) {
          case 'titleText':
            displayTitle.textContent = target.value || '吃了幾碗飯';
            break;
          case 'titleSize':
            displayTitle.style.fontSize = `${target.value}px`;
            break;
          case 'totalVal': {
            const newTotal = Math.max(1, Number(target.value) || 1);
            const progressSlider = document.getElementById('progressVal');
            progressSlider.max = newTotal;
            if (Number(progressSlider.value) > newTotal) {
              progressSlider.value = newTotal;
            }
            updateProgressDisplay(progressSlider.value, newTotal);
            break;
          }
          case 'progressVal':
            updateProgressDisplay(target.value, document.getElementById('totalVal').value);
            break;
          case 'themeColor':
            document.documentElement.style.setProperty('--theme-color', target.value);
            break;
          case 'statusSize':
            document.getElementById('displayPercent').style.fontSize = `${target.value}px`;
            break;
          case 'fontFamily':
            debouncedLoadAndApply(target.value);
            break;
        }
      });
    });
  </script>
</body>
</html>
