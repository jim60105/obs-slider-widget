<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OBS Slider Widget</title>
  <meta name="robots" content="index, follow" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://slider.obs.xn--jgy.tw/" />
  <meta property="og:title" content="OBS Slider Widget" />
  <meta property="og:description" content="OBS 垂直進度條小工具 - 為直播畫面加上精緻的進度條" />
  <meta property="og:image" content="https://slider.obs.xn--jgy.tw/docs/preview.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:url" content="https://slider.obs.xn--jgy.tw/" />
  <meta name="twitter:title" content="OBS Slider Widget" />
  <meta name="twitter:description" content="OBS 垂直進度條小工具 - 為直播畫面加上精緻的進度條" />
  <meta name="twitter:image" content="https://slider.obs.xn--jgy.tw/docs/preview.png" />

  <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="OBS Slider" />
  <link rel="manifest" href="/site.webmanifest" />

  <!-- Tailwind CSS CDN (with typography plugin) -->
  <script src="https://cdn.tailwindcss.com?plugins=typography"></script>

  <!-- Google Fonts: Default Font -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=UoqMunThenKhung&display=swap">

  <!-- Markdown Parser -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <!-- Tailwind Configuration -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ["'UoqMunThenKhung'", "'Segoe UI'", 'Tahoma', 'Geneva', 'Verdana', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <!-- OBS Detection -->
  <script>
    if (navigator.userAgent.indexOf('OBS') !== -1) {
      document.documentElement.classList.add('obs');
    }
  </script>

  <!-- Global Styles -->
  <link rel="stylesheet" href="style.css">
</head>

<body class="font-sans">
  <!-- Three-Panel Layout -->
  <div id="layoutContainer" class="flex h-screen w-screen overflow-hidden gap-1">

    <!-- Left Panel: README -->
    <section id="readmePanel" class="glass w-[60vw] flex flex-col p-6 overflow-y-auto" style="scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.2) transparent;">
      <div id="readmeContent" class="prose prose-invert prose-sm max-w-none">
        <p class="text-white/50 text-sm">載入中...</p>
      </div>
    </section>

    <!-- Middle Panel: Controls Area -->
    <aside class="glass w-[330px] flex flex-col p-6 overflow-y-auto" style="scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.2) transparent;">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-semibold text-white/90">控制台</h2>
        <button type="button" id="flipLayout" aria-label="Flip layout"
                class="glass-input w-8 h-8 text-sm text-white/90 rounded-lg flex items-center justify-center cursor-pointer select-none" title="翻轉面板">⇄</button>
      </div>
      <form id="controlForm" class="space-y-5">

        <!-- Preset Management -->
        <div class="space-y-2 pb-4 mb-1 border-b border-white/10">
          <label class="block text-sm text-white/70 mb-1">預設管理</label>
          <div id="presetSelect" class="custom-dropdown" data-value="">
            <button type="button" class="custom-dropdown-trigger glass-input w-full px-3 py-2 rounded-lg text-white/90 outline-none focus:ring-1 focus:ring-white/40 cursor-pointer text-left flex justify-between items-center"
                    aria-haspopup="listbox" aria-expanded="false">
              <span class="custom-dropdown-text">選擇預設</span>
              <span class="custom-dropdown-chevron">▼</span>
            </button>
            <ul class="custom-dropdown-options" role="listbox" hidden>
              <!-- Options populated by JS -->
            </ul>
          </div>
          <div class="flex gap-2">
            <input type="text" id="presetName" placeholder="預設名稱..."
                   class="glass-input flex-1 min-w-0 px-3 py-2 rounded-lg text-white/90 placeholder-white/40 outline-none focus:ring-1 focus:ring-white/40" />
            <button type="button" id="presetSave"
                    class="glass-input flex-shrink-0 whitespace-nowrap px-3 py-2 rounded-lg text-white/90 cursor-pointer select-none hover:bg-white/20 transition-colors">儲存</button>
            <button type="button" id="presetDelete"
                    class="glass-input flex-shrink-0 whitespace-nowrap px-3 py-2 rounded-lg text-white/90 cursor-pointer select-none hover:bg-white/20 transition-colors">刪除</button>
          </div>
        </div>
        
        <div>
          <label for="titleText" class="block text-sm text-white/70 mb-1">標題文字</label>
          <input type="text" id="titleText" value="今天喝了幾杯飲料" placeholder="輸入標題..."
                 class="glass-input w-full px-3 py-2 rounded-lg text-white/90 placeholder-white/40 outline-none focus:ring-1 focus:ring-white/40" />
        </div>
        
        <div>
          <label for="titleSize" class="block text-sm text-white/70 mb-1">標題尺寸 (12 ~ 32px)</label>
          <input type="range" id="titleSize" min="12" max="32" value="32" class="glass-range w-full" />
        </div>
        
        <div>
          <label for="totalVal" class="block text-sm text-white/70 mb-1">總數值</label>
          <input type="number" id="totalVal" min="1" value="20"
                 class="glass-input w-full px-3 py-2 rounded-lg text-white/90 placeholder-white/40 outline-none focus:ring-1 focus:ring-white/40" />
        </div>
        
        <div>
          <label for="progressVal" class="block text-sm text-white/70 mb-1">進度值</label>
          <div class="flex items-center gap-2">
            <button type="button" id="progressDec" aria-label="Decrease progress"
                    class="glass-input w-12 h-10 text-xl font-bold text-white/90 rounded-lg flex items-center justify-center cursor-pointer select-none">−</button>
            <input type="range" id="progressVal" min="0" max="20" value="12" class="glass-range flex-1" />
            <button type="button" id="progressInc" aria-label="Increase progress"
                    class="glass-input w-12 h-10 text-xl font-bold text-white/90 rounded-lg flex items-center justify-center cursor-pointer select-none">+</button>
          </div>
        </div>
        
        <div>
          <label for="themeColor" class="block text-sm text-white/70 mb-1">主題色彩</label>
          <input type="text" id="themeColor" value="#707" placeholder="#707"
                 class="glass-input w-full px-3 py-2 rounded-lg text-white/90 placeholder-white/40 outline-none focus:ring-1 focus:ring-white/40"
                 style="border-left: 6px solid #707;" />
        </div>
        
        <div>
          <label for="statusSize" class="block text-sm text-white/70 mb-1">狀態尺寸 (10 ~ 24px)</label>
          <input type="range" id="statusSize" min="10" max="24" value="24" class="glass-range w-full" />
        </div>
        
        <div>
          <label for="fontFamily" class="block text-sm text-white/70 mb-1">字型名稱</label>
          <input type="text" id="fontFamily" value="UoqMunThenKhung" placeholder="輸入字型名稱..."
                 class="glass-input w-full px-3 py-2 rounded-lg text-white/90 placeholder-white/40 outline-none focus:ring-1 focus:ring-white/40" />
          <p class="text-xs text-white/40 mt-1">從 <a href="https://fonts.google.com" target="_blank" rel="noopener noreferrer" class="underline hover:text-white/60">fonts.google.com</a> 取得可用字型名稱</p>
        </div>
      </form>
      <footer class="mt-auto pt-4 border-t border-white/10 text-center text-xs text-white/50 space-y-1">
        <p>
          Copyright &copy; 2026 Jim Chen
          <a href="https://github.com/jim60105/obs-slider-widget" target="_blank" rel="noopener noreferrer" class="inline-block align-middle ml-1 hover:text-white/80 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16">
              <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
            </svg>
          </a>
        </p>
        <p>Licensed under <a href="./LICENSE" target="_blank" rel="noopener noreferrer" class="underline hover:text-white/80 transition-colors">AGPLv3</a></p>
      </footer>
    </aside>

    <!-- Right Panel: Display Area -->
    <main id="displayPanel" class="glass flex-1 flex items-stretch justify-end p-8">
      <!-- Progress Bar Widget -->
      <div class="flex items-stretch gap-4 h-full">
        <!-- Vertical Title (align top) -->
        <span id="displayTitle" class="progress-title self-start" style="font-size: 16px;">STATUS</span>

        <!-- Glass Track -->
        <div id="myProgressBar" class="glass-track" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
          <div id="myProgressFill" class="glass-fill"></div>
        </div>

        <!-- Fraction Display (right of track, bottom-aligned) -->
        <span id="displayPercent" class="progress-status self-end pb-1" style="font-size: 14px; color: color-mix(in srgb, var(--theme-color) 80%, transparent);">0<br>/<br>20</span>
      </div>
    </main>

  </div>

  <script src="app.js"></script>
</body>
</html>
